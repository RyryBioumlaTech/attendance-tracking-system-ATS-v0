<div class="px-4 pt-2 report-sec">
    <div class="report_title">
        <div
            style="display: flex; gap: 10px; font-weight: 600; color: #b6b6b6; align-items: center; margin-bottom: 5px;">
            <i class="bi bi-list-task"></i>
            <span>REPORTS</span>
        </div>
    </div>
    <div>

        <div class="report_form_sec">
            <div>
                <form action="/load/report_data" method="post" data-target=".data_table" class="d-flex flex-row gap-2"
                    id="search_form">
                    <select name="department_id" id="dep_id" class="general-input filter-input">
                        <option>Select a department</option>
                        {% for dep in departments %}
                        <option value="{{ dep.id}}">{{ dep.name }}</option>
                        {% endfor %}
                    </select>
                    <span>from : </span>
                    <input type="date" name="start_date" id="start" class="general-input filter-input" required>
                    <span>to : </span>
                    <input type="date" name="end_date" id="end" class="general-input filter-input" required>
                    <!-- <input type="submit" value="Search" class="button" id="search_btn"> -->
                    <button type="submit" class="button" id="search_btn" style="display: flex; gap: 5px;">
                        <i class="bi bi-search"></i>
                        Search
                    </button>
                </form>
            </div>
            <div style="width: fit-content;">
                <form action="/export_datas" method="post" class="d-flex flex-row gap-2" id="export_pdf_form">
                    <input type="hidden" name="exp_dep_id" id="exp_dep_id">
                    <input type="hidden" name="exp_start_date" id="exp_start_date">
                    <input type="hidden" name="exp_end_date" id="exp_end_date">
                    <select name="export_type" id="exp_type" class="general-input filter-input">
                        <option value="excel">excel</option>
                        <option value="pdf">pdf</option>
                        <option value="csv">csv</option>
                    </select>
                    <input type="submit" value="Export Data" id="exp-btn" class="button">
                </form>
            </div>
        </div>
        <div class="spinner-border text-success mt-3 global-spinner" role="status" style="display: none;">
            <span class="sr-only"></span>
        </div>
        <div class="data_table">
            <p class="no-data-msg">No data found</p>
        </div>


        {% with messages = get_flashed_messages(with_categories=true)%}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} mt-3 flash_msg" style='width:400px;'>
            <p>{{ message }}</p>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="lamda" style="display:none ;"></div>
    </div>
</div>
